<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano Scales Trainer</title>
  <link rel="stylesheet" href="style.css">
  <!-- PWA head -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxjaXJjbGUgY3g9Ijk2IiBjeT0iOTYiIHI9Ijk2IiBmaWxsPSIjM2I4MmY2Ii8+Cjx0ZXh0IHg9Ijk2IiB5PSIxMDIiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtd2VpZ2h0PSJib2xkIj5QSTI8L3RleHQ+Cjwvc3ZnPg==">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎹 Piano Scales Trainer</h1>
      <p>Entraînement gammes jazz - Cycle des quintes</p>
    </header>

    <div id="home" class="card">
      <h2>Accueil</h2>
      <button id="btn-quiz" class="btn btn-primary">🚀 Lancer Quiz</button>
      <button id="btn-learning" class="btn btn-secondary">📚 Learning</button>
      <div id="stats">Stats du jour : 0/0 correct</div>
    </div>

    <div id="quiz-area" class="card" style="display:none;">
      <h2>Quiz</h2>
      <div id="question"></div>
      <div id="options"></div>
      <div id="keyboard-container">
        <div id="keyboard"></div>
      </div>
      <button id="toggle-enharmonic" class="btn btn-secondary">Tolérance enharmonique : OFF</button>
      <div class="progress"><div id="progress-bar" class="progress-bar" style="width:0%"></div></div>
      <button id="next-question" class="btn btn-primary" style="display:none;">Suivant</button>
    </div>

    <div id="learning-area" class="card" style="display:none;">
      <h2>Learning</h2>
      <div id="scale-info"></div>
      <div id="keyboard-learning"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
